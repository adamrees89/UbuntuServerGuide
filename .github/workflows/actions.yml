name: Build PDF from LaTeX

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore TeX Live cache
        uses: actions/cache@v4
        with:
          path: |
            /tmp/texlive
            ~/.texlive*
            ~/.tlpkg
          key: ${{ runner.os }}-texlive-${{ hashFiles('texlive/texlive_packages', 'texlive/texlive.profile') }}
          restore-keys: |
            ${{ runner.os }}-texlive-

      - name: Install TeX Live prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget perl python3-pygments

      - name: Install TeX Live packages
        run: |
          chmod +x texlive/texlive_install.sh
          ./texlive/texlive_install.sh
          echo "/tmp/texlive/bin/$(uname -m)-linux" >> $GITHUB_PATH
      
      - name: Check TeX Live installation
        run: |
          which pdflatex || true
          pdflatex --version || true
          tlmgr --version || true
          tlmgr option repository || true

      - name: Generate pdfs 
        run: |
              cd "$GITHUB_WORKSPACE"
              pdflatex 'Server Set ups.tex'
        
      - name: Commit and push PDFs
        run: |
              git config --global user.name 'GitHub Actions'
              git config --global user.email 'actions@github.com'
              git add templates/*.pdf
              git commit -m "Update generated PDFs" || echo "No changes to commit"
              git push

