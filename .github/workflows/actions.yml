name: Build PDF from LaTeX

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Cache TeX Live installation
        uses: actions/cache@v4
        with:
          path: /tmp/texlive
          key: texlive-2026-${{ hashFiles('texlive/texlive.profile', 'texlive/texlive_packages') }}
          restore-keys: |
            texlive-2026-

      - name: Install TeX Live + packages
        shell: bash
        run: |
          chmod +x texlive/texlive_install.sh
          texlive/texlive_install.sh

      - name: Build PDF
        shell: bash
        run: |
          export PATH=/tmp/texlive/bin/x86_64-linux:$PATH
          latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error "Server Set ups.tex"

      - name: Commit and push PDF to repo
        if: github.ref == 'refs/heads/master'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "Server Set ups.pdf"
          git commit -m "Auto-update PDF [skip ci]" || echo "No changes to commit"
          git push
